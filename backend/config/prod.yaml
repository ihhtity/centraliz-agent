# Production Environment Configuration
server:
  port: ":8080"
  host: "0.0.0.0"
  debug: false

database:
  host: "localhost"
  port: "3306"
  name: "centraliz"
  username: "root"
  password: "123456"
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime: 7200

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0
  pool_size: 50

jwt:
  secret: "your-secret-key-change-in-production"
  expire_hours: 24

log:
  level: "info"
  format: "json"
  output: "/var/log/centraliz/app.log"

cors:
  allowed_origins:
    - "https://your-domain.com"
    - "https://www.your-domain.com"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"

rate_limit:
  requests_per_second: 100
  burst: 200